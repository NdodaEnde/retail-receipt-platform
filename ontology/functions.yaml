# KlpIT Ontology — Function Catalogue (the intelligence layer).
# Versioned computed logic bound to objects/aggregates. Many already exist as
# SQL views (backend/schema.sql); this declares them with sensitivity + phase
# + how they're implemented today.
#
# Fields:
#   bound_to        object api_names and/or aggregates (market, suburb)
#   computes        what it produces
#   reads           object.property inputs (validated; drives the POPIA report)
#   output_class    sensitivity of what it emits (O|P|F|X)
#   exposure        internal | external   (external REQUIRES output_class X)
#   implemented_by  view:<name> (a real SQL view) | app (server.py code) | planned
#   min_users       user-volume tier it unlocks (from CLAUDE.md intelligence tiers)
#   phase           sprint/programme phase it goes live in
#   emits/invokes   object it creates / action it may fire
schema_version: "0.1"

functions:

  # ── Phase 1 — live ────────────────────────────────────────────────────────
  fraudScore:
    bound_to: [receipt]
    computes: "Multi-signal fraud risk (distance + velocity + duplicate) -> flag/score"
    reads: [receipt.distance_km, receipt.amount, receipt.shop_latitude, receipt.shop_longitude]
    output_class: O
    exposure: internal
    implemented_by: app
    invokes: [flagFraud]
    min_users: 0
    phase: 1

  drawEligibility:
    bound_to: [receipt]
    computes: "Is the receipt eligible for today's draw (OCR date vs upload date)"
    reads: [receipt.receipt_date, receipt.created_at]
    output_class: O
    exposure: internal
    implemented_by: app
    min_users: 0
    phase: 1

  dailySpending:
    bound_to: [market]
    computes: "Total/avg spend and receipt counts per day"
    reads: [receipt.amount, receipt.created_at]
    output_class: X
    exposure: external
    implemented_by: view:daily_spending
    min_users: 0
    phase: 1

  hourlyDistribution:
    bound_to: [market]
    computes: "Receipt volume by hour-of-day (anonymized shopping rhythm)"
    reads: [receipt.created_at]
    output_class: X
    exposure: external
    implemented_by: view:hourly_distribution
    min_users: 0
    phase: 1

  customerSummary:
    bound_to: [customer]
    computes: "Per-customer receipt count, total + avg spend"
    reads: [customer.total_receipts, customer.total_spent]
    output_class: F
    exposure: internal
    implemented_by: view:customer_summary
    min_users: 0
    phase: 1

  # ── Phase 2 — loyalty (Sprint 2, next) + shop analytics ──────────────────
  customerTier:
    bound_to: [customer]
    computes: "Bronze/Silver/Gold/Platinum from total_receipts"
    reads: [customer.total_receipts]
    output_class: O
    exposure: internal
    implemented_by: planned
    min_users: 50
    phase: 2

  streakTracking:
    bound_to: [customer]
    computes: "current_streak / longest_streak from consecutive receipt days"
    reads: [customer.total_receipts, receipt.receipt_date]
    output_class: O
    exposure: internal
    implemented_by: planned
    min_users: 50
    phase: 2

  shopPerformance:
    bound_to: [shop]
    computes: "Per-shop revenue, avg transaction, receipt count"
    reads: [shop.total_sales, receipt.amount]
    output_class: F
    exposure: internal
    implemented_by: view:shop_performance
    min_users: 50
    phase: 2

  topItems:
    bound_to: [market]
    computes: "Most-purchased raw item names + qty/price stats (pre-normalization)"
    reads: [receipt_item.name, receipt_item.quantity, receipt_item.unit_price]
    output_class: O
    exposure: internal            # raw OCR names — not exposable until normalized
    implemented_by: view:top_items
    min_users: 50
    phase: 2

  # ── Phase 3 — behavioural + normalization ────────────────────────────────
  churnRisk:
    bound_to: [customer]
    computes: "Days since last receipt vs personal cadence -> churn probability"
    reads: [customer.total_receipts, receipt.created_at]
    output_class: O
    exposure: internal
    implemented_by: view:customer_behavior
    min_users: 200
    phase: 3

  itemNormalization:              # resolves the item-normalization bottleneck
    bound_to: [receipt_item]
    computes: "Map raw OCR item name -> canonical product + category"
    reads: [receipt_item.name, receipt_item.unit_price]
    output_class: O
    exposure: internal
    implemented_by: planned
    emits: product
    min_users: 200
    phase: 3

  basketAffinity:                 # exposable ONLY on canonical category, not raw names
    bound_to: [market]
    computes: "Co-purchase affinity between product categories"
    reads: [product.category]
    output_class: X
    exposure: external
    implemented_by: view:item_pairs
    min_users: 200
    phase: 3

  # ── Phase 4 — SA-context moat + B2B (needs volume) ───────────────────────
  suburbSpendIndex:
    bound_to: [suburb]
    computes: "Anonymized suburb-level spend density (aggregated; no per-receipt detail)"
    reads: [shop.latitude, shop.longitude, receipt.amount]
    output_class: X
    exposure: external
    implemented_by: planned
    min_users: 500
    phase: 4

  sassaGrantCycleImpact:
    bound_to: [market]
    computes: "Spend uplift around SASSA grant payment dates (aggregate)"
    reads: [receipt.amount, receipt.created_at]
    output_class: X
    exposure: external
    implemented_by: planned
    min_users: 500
    phase: 4

  marketShareEstimate:            # B2B data product
    bound_to: [suburb]
    computes: "Estimated retailer share of wallet per suburb (category-level)"
    reads: [product.category, shop.name]
    output_class: X
    exposure: external
    implemented_by: planned
    min_users: 1000
    phase: 4
